name: Keep API warm

# Render's free tier spins the API down after ~15 min idle; the next request
# then pays a 30-60s cold-start penalty, which shows up as "login is slow".
# Ping /health often enough that it never goes idle.
on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API health endpoint
        run: curl -fsS --max-time 30 https://ymca-g4by.onrender.com/health
